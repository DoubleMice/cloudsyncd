<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0d12">
  <title>cloudsyncd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2334d399'/><stop offset='100%' stop-color='%23059669'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%230c0f16'/><path d='M65 35a20 20 0 01-30 17.3' stroke='url(%23g)' stroke-width='7' stroke-linecap='round' fill='none'/><path d='M35 65a20 20 0 0130-17.3' stroke='url(%23g)' stroke-width='7' stroke-linecap='round' fill='none'/><polygon points='38,46 28,52 38,58' fill='%2334d399'/><polygon points='62,42 72,48 62,54' fill='%2334d399'/></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0d12;
      --bg-subtle: #0f141d;
      --surface: #111722;
      --surface-hover: #151d2b;
      --surface-active: #1b2636;
      --glass: rgba(17,23,34,0.94);
      --glass-border: rgba(255,255,255,0.08);
      --accent: #10b981;
      --accent-strong: #047857;
      --accent-soft: rgba(16,185,129,0.12);
      --accent-softer: rgba(16,185,129,0.07);
      --folder-soft: rgba(59,130,246,0.13);
      --folder: #60a5fa;
      --file-soft: rgba(245,158,11,0.14);
      --file: #f59e0b;
      --text: #e8ecf4;
      --text-2: #a1adbd;
      --text-3: #6f7c91;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.08);
      --error-border: rgba(248,113,113,0.18);
      --radius: 8px;
      --radius-sm: 8px;
      --radius-xs: 7px;
      --radius-pill: 999px;
      --ring: rgba(52,211,153,0.22);
      --ring-soft: rgba(52,211,153,0.14);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.22);
      --shadow: 0 8px 28px rgba(0,0,0,0.22);
      --shadow-lg: 0 18px 48px rgba(0,0,0,0.28);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
      --t-fast: 0.15s var(--ease-out);
      --t: 0.22s var(--ease-out);
      --t-slow: 0.4s var(--ease);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
      --toast-info-bg: rgba(255,255,255,0.07);
      --toast-info-border: rgba(255,255,255,0.09);
      --selection-bg: rgba(52,211,153,0.28);
      --selection-fg: #fff;
      color-scheme: dark;
    }

    [data-theme="light"] {
      --bg: #f7f9fc;
      --bg-subtle: #eef2f7;
      --surface: #ffffff;
      --surface-hover: #f8fafc;
      --surface-active: #eef2f7;
      --glass: rgba(255,255,255,0.95);
      --glass-border: rgba(15,23,42,0.10);
      --accent: #059669;
      --accent-strong: #047857;
      --accent-soft: rgba(5,150,105,0.10);
      --accent-softer: rgba(5,150,105,0.06);
      --folder-soft: rgba(37,99,235,0.10);
      --folder: #2563eb;
      --file-soft: rgba(217,119,6,0.11);
      --file: #d97706;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #8190a5;
      --border: rgba(15,23,42,0.09);
      --border-strong: rgba(15,23,42,0.16);
      --error: #dc2626;
      --error-bg: rgba(220,38,38,0.07);
      --error-border: rgba(220,38,38,0.20);
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.06);
      --shadow: 0 4px 16px rgba(15,23,42,0.08);
      --shadow-lg: 0 12px 40px rgba(15,23,42,0.12);
      --ring: rgba(5,150,105,0.30);
      --ring-soft: rgba(5,150,105,0.16);
      --toast-info-bg: rgba(15,23,42,0.04);
      --toast-info-border: rgba(15,23,42,0.08);
      --selection-bg: rgba(5,150,105,0.16);
      --selection-fg: inherit;
      color-scheme: light;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    ::selection { background: var(--selection-bg); color: var(--selection-fg); }

    :focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; border-radius: var(--radius-xs); }

    body::before {
      content: none;
    }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: clamp(1rem, 3vw, 2.5rem);
      position: relative;
      z-index: 1;
    }

    /* ── Screens ── */
    .screen { display: none; opacity: 0; }
    #pair-screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100dvh - clamp(2rem, 6vw, 5rem));
      text-align: center;
      animation: fadeUp 0.5s var(--ease) forwards;
    }
    #main-screen.active {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - clamp(2rem, 6vw, 5rem));
      padding-top: 0.5rem;
      animation: fadeUp 0.5s var(--ease) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 0.5rem; }
    #pair-screen .logo { justify-content: center; margin-bottom: 1rem; }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; letter-spacing: 0; color: var(--text); }

    /* ── Pair Screen ── */
    .subtitle {
      color: var(--text-2);
      font-size: 0.88rem;
      margin-bottom: 1.75rem;
      line-height: 1.65;
      max-width: 300px;
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0.5rem 0.95rem; border-radius: var(--radius-pill);
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0;
      margin-bottom: 1.75rem;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: background var(--t), border-color var(--t), color var(--t);
    }
    .status-pill.waiting { background: var(--surface); border: 1px solid var(--border); color: var(--text-2); }
    .status-pill.working { background: var(--accent-soft); border: 1px solid rgba(52,211,153,0.22); color: var(--accent); }
    .status-pill.success { background: var(--accent-soft); border: 1px solid rgba(52,211,153,0.28); color: var(--accent); }
    .status-pill.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
    .status-pill.working .status-dot { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .pin-group { display: flex; gap: 12px; justify-content: center; margin: 0 0 2rem; }
    .pin-input {
      width: 48px; height: 56px;
      text-align: center; font-size: 1.3rem; font-weight: 600;
      font-family: var(--mono); letter-spacing: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text); outline: none;
      transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast), color var(--t-fast), transform var(--t-fast);
      caret-color: var(--accent);
    }
    .pin-input:hover { border-color: var(--border-strong); background: var(--surface-hover); }
    .pin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring-soft); background: var(--surface-hover); }
    .pin-input:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--ring-soft); }
    .pin-input.filled { border-color: rgba(52,211,153,0.45); background: var(--accent-softer); color: var(--accent); }
    .pin-input.shake { animation: shake 0.4s ease; }
    @keyframes shake { 20%,60% { transform: translateX(-4px); } 40%,80% { transform: translateX(4px); } }

    .btn {
      width: 100%; max-width: 320px;
      padding: 0.85rem; border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.9rem; font-weight: 600; letter-spacing: 0;
      cursor: pointer;
      transition: background var(--t), box-shadow var(--t), transform var(--t-fast), color var(--t);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-strong); box-shadow: var(--shadow); transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); box-shadow: 0 2px 8px rgba(52,211,153,0.15); }
    .btn-primary:disabled { background: var(--surface-active); color: var(--text-3); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Main Header ── */
    .main-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
    .main-header .logo { margin-bottom: 0; }
    .conn-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.35rem 0.75rem; border-radius: var(--radius-pill);
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0;
      background: var(--accent-softer); border: 1px solid rgba(52,211,153,0.14);
      color: var(--accent);
    }
    .conn-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: pulse 2.4s ease-in-out infinite; }

    /* ── Section Header ── */
    .section-header {
      display: grid; grid-template-columns: minmax(0, 1fr) auto;
      align-items: center; gap: 0.9rem;
      margin-bottom: 0.85rem; padding: 0 0.1rem;
    }
    .section-title-group { display: flex; align-items: baseline; gap: 0.65rem; min-width: 0; }
    .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0; color: var(--text-3); }
    .file-count-summary { color: var(--text-3); font-size: 0.75rem; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .section-actions { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .search-field {
      position: relative;
      width: min(34vw, 260px);
      min-width: 180px;
    }
    .search-field svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: var(--text-3); pointer-events: none;
    }
    .search-input {
      width: 100%; height: 36px;
      padding: 0 0.75rem 0 2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font: 500 0.82rem var(--font);
      outline: none;
      transition: border-color var(--t-fast), background var(--t-fast), box-shadow var(--t-fast);
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:hover { border-color: var(--border-strong); background: var(--surface-hover); }
    .search-input:focus { border-color: rgba(52,211,153,0.45); box-shadow: 0 0 0 3px var(--ring-soft); background: var(--surface); }
    .refresh-btn, .icon-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-3); width: 36px; height: 36px;
      border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color var(--t-fast), color var(--t-fast), background var(--t-fast), transform var(--t-fast);
    }
    .refresh-btn:hover { border-color: rgba(52,211,153,0.32); color: var(--accent); background: var(--accent-softer); }
    .refresh-btn:active { transform: scale(0.92); }
    .refresh-btn:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .refresh-btn.spinning svg { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── File List ── */
    .file-list {
      list-style: none; flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      padding: 0 4px 0 0;
    }
    .file-list.selection-mode { padding-bottom: 92px; }
    .file-list::-webkit-scrollbar { width: 6px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; border: 1px solid transparent; background-clip: padding-box; }
    .file-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; }

    .file-item {
      display: grid; grid-template-columns: 30px minmax(0, 1fr) auto; align-items: center; gap: 12px;
      min-height: 64px;
      padding: 0.75rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--t-fast), border-color var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
      position: relative;
    }
    .file-item:hover { background: var(--surface-hover); border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
    .file-item:active { transform: scale(0.997); }
    .file-item.downloading { opacity: 0.55; pointer-events: none; }
    .file-item.download-complete { background: var(--accent-soft); border-color: rgba(52,211,153,0.28); box-shadow: 0 4px 18px rgba(52,211,153,0.08); }
    .file-item.download-complete .file-dl { background: var(--accent); border-color: var(--accent); color: #fff; }
    .file-item.dir-item {
      cursor: default; background: transparent; border-color: transparent;
      grid-template-columns: minmax(0, 1fr);
      min-height: 36px;
      padding: 0.25rem 0.35rem;
    }
    .file-item.dir-item:hover { background: transparent; border-color: transparent; box-shadow: none; }

    .file-content-wrapper { min-width: 0; }
    .file-icon {
      width: 30px; height: 30px; border-radius: var(--radius-xs);
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--file-soft); color: var(--file);
      flex-shrink: 0;
    }
    .file-icon svg { width: 16px; height: 16px; }
    .file-icon.image, .file-icon.media { background: var(--folder-soft); color: var(--folder); }
    .file-icon.archive { background: var(--accent-softer); color: var(--accent); }
    .file-name { font-size: 0.9rem; font-weight: 600; overflow-wrap: anywhere; color: var(--text); line-height: 1.35; }
    .file-meta { color: var(--text-3); font-size: 0.75rem; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .file-dl {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); font-size: 0.8rem; font-weight: 600;
      white-space: nowrap; padding: 0.38rem 0.7rem;
      border-radius: var(--radius-xs); background: var(--accent-softer);
      border: 1px solid rgba(52,211,153,0.12);
      transition: opacity var(--t-fast), background var(--t-fast), border-color var(--t-fast);
    }
    .file-dl svg { width: 14px; height: 14px; }
    .file-dl:hover { background: var(--accent-soft); border-color: rgba(52,211,153,0.2); }
    .dir-name {
      color: var(--text-2); font-size: 0.88rem; font-weight: 600; letter-spacing: 0;
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      user-select: none;
    }
    .dir-icon { width: 18px; height: 18px; color: var(--folder); }
    .dir-chevron {
      width: 16px; height: 16px; transition: transform 0.22s var(--ease-out); flex-shrink: 0;
      color: var(--text-3);
    }
    .dir-item:hover .dir-chevron { color: var(--text-2); }
    .dir-item.collapsed .dir-chevron { transform: rotate(-90deg); }
    .file-item.dir-child-hidden { display: none; }
    .indent-1 { margin-left: 1.25rem; }
    .indent-2 { margin-left: 2.5rem; }
    .indent-3 { margin-left: 3.75rem; }

    /* ── Checkbox (hidden by default) ── */
    .file-checkbox { display: none; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; cursor: pointer; z-index: 10; opacity: 0; margin: 0; }
    .file-checkbox-label {
      display: none; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; background: var(--surface-hover);
      border: 2px solid rgba(255,255,255,0.14); border-radius: 6px;
      cursor: pointer; align-items: center; justify-content: center;
      transition: background var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast);
      z-index: 9;
    }
    .file-checkbox-label svg { width: 12px; height: 12px; fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity var(--t-fast); }
    .file-checkbox:checked + .file-checkbox-label { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring-soft); }
    .file-checkbox:checked + .file-checkbox-label svg { opacity: 1; }
    .file-checkbox:focus-visible + .file-checkbox-label { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring-soft); }
    .file-checkbox-label:hover { border-color: rgba(52,211,153,0.4); }
    .dir-item .file-checkbox, .dir-item .file-checkbox-label { display: none !important; }
    .file-item.selected { border-color: rgba(52,211,153,0.32); background: var(--accent-softer); box-shadow: inset 0 0 0 1px rgba(52,211,153,0.08); }

    /* ── Selection Mode ── */
    .file-list.selection-mode .file-item { padding-left: 48px; grid-template-columns: 30px minmax(0, 1fr); }
    .file-list.selection-mode .file-item.dir-item { padding-left: 34px; grid-template-columns: minmax(0, 1fr); }
    .file-list.selection-mode .file-item .file-checkbox { display: block; }
    .file-list.selection-mode .file-item .file-checkbox-label { display: flex; }
    .file-list.selection-mode .file-item.selected { background: var(--accent-soft); }
    .file-list.selection-mode .file-dl { display: none; }

    .selection-bar {
      position: fixed; left: 0; right: 0;
      background: var(--glass); backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      z-index: 100;
      transition: transform 0.32s var(--ease);
    }
    .selection-bar.top-bar {
      position: static; left: auto; right: auto;
      max-height: 0; opacity: 0; overflow: hidden;
      padding: 0 0.9rem; margin: 0;
      border: 1px solid transparent; border-radius: var(--radius);
      transform: none; pointer-events: none;
      transition: max-height var(--t), opacity var(--t-fast), padding var(--t), margin var(--t), border-color var(--t-fast);
    }
    .selection-bar.top-bar.active {
      max-height: 64px; opacity: 1; padding: 0.65rem 0.9rem; margin: 0 0 0.85rem;
      border-color: var(--glass-border); pointer-events: auto;
    }
    .selection-bar:not(.top-bar) {
      left: 50%; right: auto; bottom: 16px;
      width: min(calc(100% - 32px), 920px);
      border: 1px solid var(--glass-border); border-radius: 12px;
      box-shadow: var(--shadow-lg);
      transform: translate(-50%, calc(100% + 24px));
    }
    .selection-bar:not(.top-bar).active { transform: translate(-50%, 0); }
    .selection-info { display: flex; align-items: center; gap: 0.5rem; color: var(--text); font-size: 0.85rem; font-weight: 500; }
    .selection-count { background: var(--accent); color: #fff; padding: 0.15rem 0.55rem; border-radius: 12px; font-size: 0.75rem; min-width: 24px; text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; box-shadow: 0 0 12px rgba(52,211,153,0.3); transition: transform var(--t-fast); }
    .selection-actions { display: flex; align-items: center; gap: 0.75rem; }

    .btn-secondary {
      background: var(--surface); color: var(--text-2); border: 1px solid var(--border);
      padding: 0.42rem 0.85rem; border-radius: 8px; font-family: var(--font);
      font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
    }
    .btn-secondary:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-strong); }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-secondary:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .btn-batch {
      background: var(--accent); color: #fff; border: none;
      padding: 0.55rem 1.2rem; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.85rem; font-weight: 600; letter-spacing: 0;
      cursor: pointer;
      transition: box-shadow var(--t), transform var(--t-fast), opacity var(--t-fast);
      box-shadow: 0 2px 12px rgba(52,211,153,0.18), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-batch:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(52,211,153,0.28), inset 0 1px 0 rgba(255,255,255,0.12); transform: translateY(-1px); }
    .btn-batch:active:not(:disabled) { transform: translateY(0); box-shadow: 0 2px 8px rgba(52,211,153,0.15); }
    .btn-batch:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-batch.download-complete:disabled { opacity: 1; background: var(--accent); box-shadow: 0 4px 18px rgba(52,211,153,0.22); }
    .btn-batch:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .btn-close { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 5px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color var(--t-fast), background var(--t-fast), transform var(--t-fast); }
    .btn-close:hover { color: var(--text); background: var(--surface-hover); }
    .btn-close:active { transform: scale(0.92); }
    .btn-close:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }

    /* ── States ── */
    .loading { text-align: center; color: var(--text-3); padding: 3rem 1rem; font-size: 0.85rem; line-height: 1.6; }
    .loading.load-more { cursor: pointer; padding: 1.5rem 1rem; transition: color var(--t-fast); }
    .loading.load-more:hover { color: var(--text-2); }
    .loading.error-state { color: var(--error); }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-3); font-size: 0.88rem; line-height: 1.75; }
    .empty-icon {
      width: 44px; height: 44px; margin: 0 auto 1rem;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-3); background: var(--surface);
    }
    .empty-icon svg { width: 22px; height: 22px; }
    .empty-hint { display: block; font-size: 0.74rem; color: var(--text-3); margin-top: 0.4rem; opacity: 0.8; }
    .loading:not(.error-state)::before {
      content: '';
      display: inline-block;
      width: 14px; height: 14px; margin-right: 8px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      vertical-align: -2px;
      animation: spin 0.8s linear infinite;
    }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; pointer-events: none; }
    .toast {
      padding: 0.65rem 1.15rem; border-radius: var(--radius-pill); font-size: 0.8rem; font-weight: 500; letter-spacing: 0;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      animation: toastIn 0.3s var(--ease-out), toastOut 0.3s var(--ease-out) 2.5s forwards;
      max-width: 340px; text-align: center; line-height: 1.4;
      pointer-events: auto;
    }
    .toast.ok { background: rgba(52,211,153,0.13); border: 1px solid rgba(52,211,153,0.22); color: var(--accent); box-shadow: 0 4px 20px rgba(52,211,153,0.1); }
    .toast.err { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); box-shadow: 0 4px 20px rgba(248,113,113,0.1); }
    .toast.info { background: var(--toast-info-bg); border: 1px solid var(--toast-info-border); color: var(--text-2); box-shadow: var(--shadow); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-10px) scale(0.96); } }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 200;
      width: 38px; height: 38px; border-radius: var(--radius-pill);
      background: var(--glass); border: 1px solid var(--glass-border);
      color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow-sm);
      transition: color var(--t-fast), border-color var(--t-fast), background var(--t-fast), transform var(--t-fast), opacity var(--t-fast);
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--border-strong); transform: translateY(-1px); }
    .theme-toggle:active { transform: scale(0.94); }
    .theme-toggle:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .theme-toggle svg { width: 18px; height: 18px; }
    .theme-toggle .icon-sun { display: block; }
    .theme-toggle .icon-moon { display: none; }
    [data-theme="light"] .theme-toggle .icon-sun { display: none; }
    [data-theme="light"] .theme-toggle .icon-moon { display: block; }
    body.selection-active .theme-toggle { opacity: 0; pointer-events: none; transform: scale(0.9); }
    @media (max-width: 480px) { .theme-toggle { top: 0.75rem; right: 0.75rem; width: 34px; height: 34px; } }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      .container { padding: 2.5rem 2rem; }
      #pair-screen.active { min-height: calc(100dvh - 6.5rem); }
      #main-screen.active { height: calc(100dvh - 5rem); padding-top: 0.5rem; }
      .file-item { padding: 0.82rem 1rem; }
      .file-name { font-size: 0.9rem; }
      .file-meta { font-size: 0.78rem; }
      .pin-input { width: 54px; height: 60px; font-size: 1.5rem; border-radius: 12px; }
      .pin-group { gap: 14px; }
    }
    @media (max-width: 480px) {
      .container { padding: 1rem; }
      .main-header { margin-bottom: 1rem; padding-right: 48px; }
      .conn-badge { max-width: 116px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .section-header { grid-template-columns: 1fr; gap: 0.75rem; }
      .section-actions { width: 100%; }
      .search-field { flex: 1; width: auto; min-width: 0; }
      .file-dl { padding: 0.35rem 0.55rem; font-size: 0.75rem; }
      .file-dl svg { display: none; }
      .file-item { min-height: 62px; padding: 0.65rem 0.7rem; gap: 9px; grid-template-columns: 28px minmax(0, 1fr) auto; }
      .file-icon { width: 28px; height: 28px; }
      .selection-bar { padding: 0.6rem 1rem; }
      .selection-bar:not(.top-bar) { width: calc(100% - 16px); bottom: 8px; }
      .selection-actions { gap: 0.5rem; }
      .pin-input { width: 44px; height: 52px; font-size: 1.2rem; }
      .pin-group { gap: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
      .screen.active { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>
